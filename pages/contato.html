<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - PixelTV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #232526, #414345);
            color: #fff;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #111;
            padding: 10px 0;
            text-align: center;
        }
        .header img {
            width: 120px;
        }
        .navbar {
            display: flex;
            justify-content: center;
            padding: 15px 0;
            background-color: #111;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .navbar a:hover {
            color: #ffcc00;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #222;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            color: #ffcc00;
        }
        label {
            display: block;
            margin: 10px 0;
            color: #fff;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
        }
        input[type="submit"] {
            background-color: #ffcc00;
            color: #111;
            cursor: pointer;
            border: none;
            transition: background-color 0.3s ease;
        }
        input[type="submit"]:hover {
            background-color: #e0a800;
        }
        .footer {
            text-align: center;
            padding: 15px;
            background-color: #111;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="/assets/images/logo.png" alt="PixelTV Logo">
</div>

<div class="navbar">
    <a href="#">Início</a>
    <a href="#">Canais</a>
    <a href="#">Planos</a>
    <a href="#">Suporte</a>
</div>

<div class="container">
    <h1>Fale Conosco</h1>
    <form action="https://formspree.io/f/mlgdzgvg" method="POST">
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Mensagem:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <input type="submit" value="Enviar">
    </form>
</div>

<div class="footer">
    <p>&copy; 2026 PixelTV. Todos os direitos reservados.</p>
</div>

</body>
</html>
